name: Python checks

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest
      - name: Run synthetic aid lab smoke test
        run: python scripts/run_synthetic_aid_lab.py --regions 12 --warehouses 3 --seed 7 --output-dir outputs_ci
