<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" role="img" aria-label="Fairness-aware allocation workflow">
  <rect width="1000" height="300" fill="#ffffff"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker></defs>
  <g font-family="Arial" font-size="14" fill="#111827">
    <text x="500" y="35" font-size="22" text-anchor="middle">Fairness-Aware Aid Allocation Workflow</text>
    <rect x="40" y="110" width="140" height="70" rx="10" fill="#dbeafe" stroke="#2563eb"/><text x="110" y="142" text-anchor="middle">Need severity</text><text x="110" y="162" text-anchor="middle">+ urgency</text>
    <rect x="230" y="110" width="140" height="70" rx="10" fill="#fee2e2" stroke="#dc2626"/><text x="300" y="142" text-anchor="middle">Vulnerability</text><text x="300" y="162" text-anchor="middle">+ access</text>
    <rect x="420" y="110" width="140" height="70" rx="10" fill="#fef3c7" stroke="#d97706"/><text x="490" y="142" text-anchor="middle">Logistics</text><text x="490" y="162" text-anchor="middle">delay + risk</text>
    <rect x="610" y="110" width="150" height="70" rx="10" fill="#dcfce7" stroke="#16a34a"/><text x="685" y="142" text-anchor="middle">Coverage gap</text><text x="685" y="162" text-anchor="middle">fairness boost</text>
    <rect x="820" y="110" width="140" height="70" rx="10" fill="#ede9fe" stroke="#7c3aed"/><text x="890" y="142" text-anchor="middle">Auditable</text><text x="890" y="162" text-anchor="middle">allocation</text>
    <line x1="180" y1="145" x2="230" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="370" y1="145" x2="420" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="560" y1="145" x2="610" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="760" y1="145" x2="820" y2="145" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>
